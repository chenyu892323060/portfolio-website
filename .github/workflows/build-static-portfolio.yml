name: Build Static Portfolio

on:
  workflow_dispatch:

jobs:
  build-static:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Create out archive
        run: |
          if [ ! -d out ]; then
            echo "out directory not found"
            exit 1
          fi
          cd out
          zip -r ../portfolio-out.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-out
          path: portfolio-out.zip
